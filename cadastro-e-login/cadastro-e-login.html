<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <title>Pretty Nails</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function () {
            const appVersion = '20260506-2';
            window.__prettyNailsVersion = appVersion;
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const versionSuffix = '?v=' + encodeURIComponent(appVersion);
            const cssHref = (isLocalhost ? 'cadastro-e-login.css' : '/cadastro-e-login/cadastro-e-login.css') + versionSuffix;
            const configSrc = (isLocalhost ? '../config.js' : '/config.js') + versionSuffix;
            document.write('<link rel="stylesheet" href="' + cssHref + '">');
            document.write('<script src="' + configSrc + '"><\/script>');

            // Evita cache antigo de Service Worker no Vercel que pode servir JS desatualizado.
            if (!isLocalhost && 'serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.getRegistrations()
                        .then((registrations) => {
                            registrations.forEach((registration) => registration.unregister());
                        })
                        .catch(() => {});
                });
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.min.css">
    <link rel="stylesheet" href="https://cdn.materialdesignicons.com/5.4.55/css/materialdesignicons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>

<body>
    <div class="container" id="container">
        <!-- Formulário de Cadastro -->
        <div class="form-container sign-up-container">
            <form onsubmit="event.preventDefault(); adicionarUsuario()">
                <h1>Criar Conta</h1>
                <div class="input-icon">
                    <i class="mdi mdi-account"></i>
                    <input type="text" id="nome" placeholder="Nome" required />
                </div>
                <div class="input-icon">
                    <i class="mdi mdi-email"></i>
                    <input type="email" id="cadastro-email" placeholder="Email" required />
                </div>
                <div class="input-icon">
                    <i class="mdi mdi-lock"></i>
                    <input type="password" id="cadastro-senha" placeholder="Senha" required />
                </div>
                <div class="input-icon">
                    <i class="mdi mdi-phone"></i>
                    <input type="tel" id="telefone" placeholder="(00)00000-0000" maxlength="14" required />
                </div>
                <div class="input-icon">
                    <i class="mdi mdi-map-marker"></i>
                    <select id="estado" onchange="carregarCidades()" required>
                        <option value="" disabled selected>Estado</option>
                    </select>
                </div>
                <div class="input-icon">
                    <i class="mdi mdi-city"></i>
                    <select id="cidade" required>
                        <option value="" disabled selected>Cidade</option>
                    </select>
                </div>
                <button>Cadastrar</button>
            </form>
            <p class="mobile-toggle-text">Já tem uma conta? <span class="mobile-toggle-link" id="mobileSignIn">Faça login</span></p>
        </div>

        <!-- Formulário de Login -->
        <div class="form-container sign-in-container">
            <form onsubmit="event.preventDefault(); loginUsuario()">
                <h1>Entrar</h1>
                <div class="input-icon">
                    <i class="mdi mdi-email"></i>
                    <input type="email" id="login-email" placeholder="Email" required />
                </div>
                <div class="input-icon">
                    <i class="mdi mdi-lock"></i>
                    <input type="password" id="login-senha" placeholder="Senha" required />
                </div>
                <button>Entrar</button>
                <div class="plataformas-digitais">
                    <div style="display: flex; justify-content: center; margin-top: 16px;">
                        <div id="buttonDiv"></div>
                    </div>
                </div>
            </form>
            <p class="mobile-toggle-text">Não tem uma conta? <span class="mobile-toggle-link" id="mobileSignUp">Cadastre-se</span></p>
        </div>

        <!-- Painel lateral com animação -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h2>Já tem conta?</h2>
                    <p>Entre agora mesmo para ver suas unhas favoritas!</p>
                    <button class="ghost" id="signIn">Entrar</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h2>Nova por aqui?</h2>
                    <p>Crie uma conta e descubra os estilos mais lindos!</p>
                    <button class="ghost" id="signUp">Cadastrar</button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
    <script>
        (function () {
            const appVersion = window.__prettyNailsVersion || '20260506-2';
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const versionSuffix = '?v=' + encodeURIComponent(appVersion);
            const cadastroScript = (isLocalhost ? 'cadastro-e-login.js' : '/cadastro-e-login/cadastro-e-login.js') + versionSuffix;
            const usersScript = (isLocalhost ? 'users.js' : '/cadastro-e-login/users.js') + versionSuffix;
            document.write('<script src="' + cadastroScript + '"><\/script>');
            document.write('<script src="' + usersScript + '"><\/script>');
        })();
    </script>
</body>

</html>
